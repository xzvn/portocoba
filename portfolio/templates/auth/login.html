<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="auth-page">
    <main class="login-card">
        <a class="login-brand" href="{{ url_for('public.home') }}">Portfolio</a>
        <h1>Login Admin</h1>
        <p>Masuk untuk mengelola profil, skill, pengalaman, proyek, dan pesan.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="admin-alert {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Email<input type="email" name="email" value="{{ email or '' }}" autocomplete="email" required></label>
            <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
            <label class="check-row"><input type="checkbox" name="remember"> Ingat saya</label>
            <button type="submit">Login</button>
        </form>
        <a class="back-link" href="{{ url_for('public.home') }}">← Kembali ke portofolio</a>
    </main>
</body>
</html>
