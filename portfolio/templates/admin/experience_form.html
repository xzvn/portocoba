{% extends "admin/base.html" %}{% block heading %}{{ 'Edit' if item.id else 'Tambah' }} Pengalaman{% endblock %}{% block content %}
<form class="admin-card admin-form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="form-grid two">
<label>Periode<input name="period" value="{{ item.period or '' }}" placeholder="2022 - Present" required></label><label>Tipe<select name="item_type"><option value="pengalaman" {% if item.item_type=='pengalaman' %}selected{% endif %}>pengalaman</option><option value="edukasi" {% if item.item_type=='edukasi' %}selected{% endif %}>Edukasi</option></select></label><label>Judul<input name="title" value="{{ item.title or '' }}" required></label><label>Organisasi<input name="organization" value="{{ item.organisasi or '' }}" required></label><label class="full">Deskripsi<textarea name="description" rows="6" required>{{ item.deskripsi or '' }}</textarea></label><label>Urutan<input type="nomor" name="sort_order" value="{{ item.sort_order or 0 }}"></label><label class="check-row"><input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}> Tandai sebagai posisi aktif</label></div><button class="admin-btn primary">Simpan</button></form>{% endblock %}
