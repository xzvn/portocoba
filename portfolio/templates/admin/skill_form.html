{% extends "admin/base.html" %}{% block heading %}{{ 'Edit' if item.id else 'Tambah' }} Skill{% endblock %}{% block content %}
<form class="admin-card admin-form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-grid two"><label>Kategori<input name="category" value="{{ item.category or '' }}" required></label><label>Ikon Material Symbols<input name="icon" value="{{ item.icon or 'code' }}" required><small>Contoh: code, database, brush, construction</small></label><label class="full">Daftar kemampuan<textarea name="items" rows="7" required>{{ item.items or '' }}</textarea><small>Satu kemampuan per baris.</small></label><label>Urutan<input type="number" name="sort_order" value="{{ item.sort_order or 0 }}"></label></div><button class="admin-btn primary">Simpan</button></form>{% endblock %}
