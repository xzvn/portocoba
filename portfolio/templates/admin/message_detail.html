{% extends "admin/base.html" %}{% block heading %}Detail Pesan{% endblock %}{% block content %}
<article class="admin-card message-card"><div class="card-title"><div><h2>{{ item.subject }}</h2><p>Dari {{ item.name }} · <a href="mailto:{{ item.email }}">{{ item.email }}</a></p></div><span>{{ item.created_at.strftime('%d-%m-%Y %H:%M') }}</span></div><div class="message-body">{{ item.message }}</div><div class="page-actions"><a class="admin-btn primary" href="mailto:{{ item.email }}?subject=Re: {{ item.subject|urlencode }}">Balas lewat email</a><a class="admin-btn secondary" href="{{ url_for('admin.messages') }}">Kembali</a></div></article>{% endblock %}
